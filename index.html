<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Hola Mundo en 20 idiomas</title>
    <link rel="icon" href="data:," />
    <style>
      :root {
        color-scheme: dark;
        --bg: #080b12;
        --panel: rgba(255, 255, 255, 0.08);
        --panel-strong: rgba(255, 255, 255, 0.14);
        --text: #f8fbff;
        --muted: #aeb9c8;
        --cyan: #47d7ff;
        --gold: #ffd166;
        --rose: #ff6b8a;
        --mint: #75e6b4;
      }

      * {
        box-sizing: border-box;
      }

      body {
        min-height: 100vh;
        margin: 0;
        overflow-x: hidden;
        background:
          radial-gradient(circle at 15% 18%, rgba(71, 215, 255, 0.22), transparent 28%),
          radial-gradient(circle at 84% 12%, rgba(255, 107, 138, 0.18), transparent 24%),
          linear-gradient(135deg, #080b12 0%, #14213d 48%, #10131d 100%);
        color: var(--text);
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI",
          sans-serif;
      }

      body::before {
        position: fixed;
        inset: 0;
        z-index: -2;
        content: "";
        background-image:
          linear-gradient(rgba(255, 255, 255, 0.05) 1px, transparent 1px),
          linear-gradient(90deg, rgba(255, 255, 255, 0.04) 1px, transparent 1px);
        background-size: 48px 48px;
        mask-image: linear-gradient(to bottom, rgba(0, 0, 0, 0.8), transparent 75%);
      }

      .sky {
        position: fixed;
        inset: 0;
        z-index: -1;
        pointer-events: none;
      }

      .spark {
        position: absolute;
        width: 4px;
        height: 4px;
        border-radius: 50%;
        background: rgba(255, 255, 255, 0.9);
        animation: drift 14s linear infinite;
        box-shadow: 0 0 18px rgba(71, 215, 255, 0.75);
      }

      .spark:nth-child(1) { left: 8%; top: 18%; animation-delay: -2s; }
      .spark:nth-child(2) { left: 26%; top: 74%; animation-delay: -8s; }
      .spark:nth-child(3) { left: 52%; top: 12%; animation-delay: -4s; }
      .spark:nth-child(4) { left: 78%; top: 42%; animation-delay: -11s; }
      .spark:nth-child(5) { left: 91%; top: 76%; animation-delay: -6s; }

      main {
        min-height: 100vh;
        display: grid;
        place-items: center;
        width: min(100%, 1180px);
        margin: 0 auto;
        padding: 32px;
      }

      .hero {
        display: grid;
        place-items: center;
        width: 100%;
      }

      .globe-wrap {
        position: relative;
        min-height: min(88vmin, 680px);
        width: min(88vmin, 680px);
        display: grid;
        place-items: center;
      }

      .globe {
        position: relative;
        width: min(70vmin, 520px);
        aspect-ratio: 1;
        border: 1px solid rgba(255, 255, 255, 0.28);
        border-radius: 50%;
        background:
          radial-gradient(circle at 35% 32%, rgba(255, 255, 255, 0.28), transparent 14%),
          radial-gradient(circle at 58% 62%, rgba(117, 230, 180, 0.18), transparent 24%),
          linear-gradient(135deg, rgba(71, 215, 255, 0.42), rgba(20, 33, 61, 0.18));
        box-shadow:
          inset -34px -26px 80px rgba(0, 0, 0, 0.45),
          0 28px 90px rgba(71, 215, 255, 0.25);
        animation: float 5s ease-in-out infinite;
        overflow: visible;
      }

      .globe::before,
      .globe::after {
        position: absolute;
        inset: 12%;
        content: "";
        border: 1px solid rgba(255, 255, 255, 0.24);
        border-radius: 50%;
      }

      .globe::after {
        inset: 0;
        border-left-color: transparent;
        border-right-color: transparent;
        animation: spin 8s linear infinite;
      }

      .language-orbit {
        position: absolute;
        inset: 8%;
        border: 1px dashed rgba(255, 255, 255, 0.24);
        border-radius: 50%;
        animation: spin 28s linear infinite;
      }

      .language-orbit span {
        position: absolute;
        top: 50%;
        left: 50%;
        width: max-content;
        transform: rotate(var(--angle)) translateX(min(29vmin, 216px)) translateY(-50%);
        transform-origin: 0 0;
      }

      .language-orbit em {
        display: inline-flex;
        min-width: 64px;
        justify-content: center;
        padding: 7px 10px;
        border-radius: 999px;
        background: rgba(8, 11, 18, 0.7);
        border: 1px solid color-mix(in srgb, var(--tone), white 18%);
        color: var(--tone);
        font-size: 0.7rem;
        font-style: normal;
        font-weight: 850;
        letter-spacing: 0;
        line-height: 1;
        white-space: nowrap;
        box-shadow: 0 10px 24px rgba(0, 0, 0, 0.2);
        transform: rotate(calc(var(--angle) * -1));
        animation: counter-spin 28s linear infinite, pulse 3.6s ease-in-out infinite;
      }

      @keyframes drift {
        0% { transform: translate3d(0, 0, 0) scale(1); opacity: 0.3; }
        45% { opacity: 1; }
        100% { transform: translate3d(18px, -90px, 0) scale(1.8); opacity: 0; }
      }

      @keyframes float {
        0%, 100% { transform: translateY(0); }
        50% { transform: translateY(-18px); }
      }

      @keyframes spin {
        to { transform: rotate(360deg); }
      }

      @keyframes counter-spin {
        from { transform: rotate(calc(var(--angle) * -1)); }
        to { transform: rotate(calc((var(--angle) * -1) - 360deg)); }
      }

      @keyframes pulse {
        0%, 100% { filter: brightness(1); }
        50% { filter: brightness(1.22); }
      }

      @media (max-width: 900px) {
        main {
          padding: 24px;
        }

        .globe-wrap {
          min-height: min(92vmin, 560px);
          width: min(92vmin, 560px);
        }

        .language-orbit {
          inset: 10%;
        }

        .language-orbit span {
          transform: rotate(var(--angle)) translateX(min(28vmin, 150px)) translateY(-50%);
        }

        .language-orbit em {
          min-width: 54px;
          padding: 6px 8px;
          font-size: 0.6rem;
        }

      }

      @media (max-width: 560px) {
        main {
          padding: 14px;
        }

        .globe {
          width: min(72vmin, 360px);
        }
      }

      @media (prefers-reduced-motion: reduce) {
        *,
        *::before,
        *::after {
          animation-duration: 1ms !important;
          animation-iteration-count: 1 !important;
          scroll-behavior: auto !important;
          transition-duration: 1ms !important;
        }
      }
    </style>
  </head>
  <body>
    <div class="sky" aria-hidden="true">
      <span class="spark"></span>
      <span class="spark"></span>
      <span class="spark"></span>
      <span class="spark"></span>
      <span class="spark"></span>
    </div>

    <main>
      <section class="hero" aria-labelledby="title">
        <h1 id="title" hidden>Hola Mundo en 20 idiomas</h1>
        <div class="globe-wrap" aria-label="Circulo animado con veinte idiomas">
          <div class="globe">
            <div class="language-orbit">
              <span style="--angle: 0deg; --tone: var(--cyan)"><em>Español</em></span>
              <span style="--angle: 18deg; --tone: var(--gold)"><em>English</em></span>
              <span style="--angle: 36deg; --tone: var(--rose)"><em>Français</em></span>
              <span style="--angle: 54deg; --tone: var(--mint)"><em>Deutsch</em></span>
              <span style="--angle: 72deg; --tone: var(--cyan)"><em>Italiano</em></span>
              <span style="--angle: 90deg; --tone: var(--gold)"><em>Português</em></span>
              <span style="--angle: 108deg; --tone: var(--rose)"><em>Nederlands</em></span>
              <span style="--angle: 126deg; --tone: var(--mint)"><em>Svenska</em></span>
              <span style="--angle: 144deg; --tone: var(--cyan)"><em>Polski</em></span>
              <span style="--angle: 162deg; --tone: var(--gold)"><em>Türkçe</em></span>
              <span style="--angle: 180deg; --tone: var(--rose)"><em>Indonesia</em></span>
              <span style="--angle: 198deg; --tone: var(--mint)"><em>Tagalog</em></span>
              <span style="--angle: 216deg; --tone: var(--cyan)"><em>Kiswahili</em></span>
              <span style="--angle: 234deg; --tone: var(--gold)"><em>Ελληνικά</em></span>
              <span style="--angle: 252deg; --tone: var(--rose)"><em>Русский</em></span>
              <span style="--angle: 270deg; --tone: var(--mint)"><em>日本語</em></span>
              <span style="--angle: 288deg; --tone: var(--cyan)"><em>中文</em></span>
              <span style="--angle: 306deg; --tone: var(--gold)"><em>한국어</em></span>
              <span style="--angle: 324deg; --tone: var(--rose)"><em>العربية</em></span>
              <span style="--angle: 342deg; --tone: var(--mint)"><em>हिन्दी</em></span>
            </div>
          </div>
        </div>
      </section>
    </main>
  </body>
</html>
